[workflow]
h1-channel-name = H1:DCS-CALIB_STRAIN_CLEAN_SUB60HZ_C01
l1-channel-name = L1:DCS-CALIB_STRAIN_CLEAN_SUB60HZ_C01
v1-channel-name = V1:Hrec_hoft_16384Hz

[workflow-datafind]
datafind-h1-frame-type = H1_HOFT_CLEAN_SUB60HZ_C01
datafind-l1-frame-type = L1_HOFT_CLEAN_SUB60HZ_C01
datafind-v1-frame-type = V1Online

[workflow-segments]
segments-veto-definer-url = https://git.ligo.org/detchar/veto-definitions/raw/O3b_CBC_H1L1V1_C01_v1.3/cbc/O3/H1L1V1-HOFT_C01_V1ONLINE_O3_CBC.xml
segments-vetoes = +CAT_2,+CAT_H
segments-dq = +IDQ-OVL_LOGLIKE_GT_5_PAD_250MS

[workflow-segments-h1&workflow-segments-l1]
segments-science = +DCS-ANALYSIS_READY_C01:1,-CAT_1

[workflow-segments-v1]
segments-science = +ITF_SCIENCE:2,-CAT_1

[workflow-segments-science]
segments-source = dqsegdb
segments-database-url = https://segments.ligo.org

[workflow-segments-veto]
segments-source = dqsegdb
segments-database-url = https://segments.ligo.org

[workflow-segments-dq]
segments-source = file

[workflow-data_quality-h1_idq]
dq-ifo = H1
dq-type = flag
dq-name = H1:IDQ-OVL_LOGLIKE_GT_5_PAD_250MS

[workflow-data_quality-l1_idq]
dq-ifo = L1
dq-type = flag
dq-name = L1:IDQ-OVL_LOGLIKE_GT_5_PAD_250MS

[workflow-data_quality-v1_idq]
dq-ifo = V1
dq-type = flag
dq-name = V1:IDQ-OVL_LOGLIKE_GT_5_PAD_250MS
